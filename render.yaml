services:
  - type: web
    name: qr-ordering-system
    env: python
    buildCommand: "python -m pip install --upgrade pip && pip install -r backend/requirements.txt && python backend/seed.py"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
